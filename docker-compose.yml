services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opsdesk
      POSTGRES_USER: opsdesk
      POSTGRES_PASSWORD: opsdesk
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsdesk -d opsdesk"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    command: ["python", "-m", "opsdesk.migrate"]
    environment:
      DATABASE_URL: postgresql+psycopg://opsdesk:opsdesk@postgres:5432/opsdesk
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: ["uvicorn", "opsdesk.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql+psycopg://opsdesk:opsdesk@postgres:5432/opsdesk
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["python", "-m", "opsdesk.worker", "--once"]
    environment:
      DATABASE_URL: postgresql+psycopg://opsdesk:opsdesk@postgres:5432/opsdesk
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
